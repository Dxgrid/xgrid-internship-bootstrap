services:
  jenkins:
    # Use custom image that includes Docker CLI
    build:
      context: .
      dockerfile: Dockerfile.jenkins
    
    container_name: jenkins-controller
    
    # Ports
    ports:
      - "8080:8080"    # Web UI
      - "50000:50000"  # Agent communication port
    
    # Environment variables
    environment:
      - JENKINS_OPTS=--httpPort=8080
      - JAVA_OPTS=-Xmx512m -Xms512m
      # JCasC configuration
      - CASC_JENKINS_CONFIG=/var/jenkins_home/jenkins.yaml
      # AWS Credentials - passed from host environment
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      # EC2 SSH Key - passed from host environment
      - EC2_SSH_PRIVATE_KEY=${EC2_SSH_PRIVATE_KEY}
    
    # Run as root to access Docker socket
    user: root
    
    # Volumes - PERSISTENCE IS KEY
    volumes:
      # 1. Jenkins home directory (persists jobs, configs, plugins)
      - jenkins_home:/var/jenkins_home
      
      # 2. JCasC configuration (auto-loaded on startup)
      - ./jenkins.yaml:/var/jenkins_home/jenkins.yaml:ro
      
      # 3. Docker socket passthrough (allows Jenkins to run Docker commands)
      - /var/run/docker.sock:/var/run/docker.sock
    
    # Permissions fix
    privileged: true
    
    # Restart policy
    restart: unless-stopped
    
    # Resource limits (optional, but good practice)
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

# Named volume for persistence
volumes:
  jenkins_home:
    driver: local
