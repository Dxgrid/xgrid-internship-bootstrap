name: Code Quality Check

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Check shell script syntax
        run: bash -n "week 1/monitor.sh" "week 1/setup.sh"

      - name: Lint Python files
        run: python3 -m py_compile "week 1/prometheus_exporter.py" "week 1/create_dashboard.py"

      - name: Validate YAML configs
        run: |
          python3 -c "import yaml; yaml.safe_load(open('week 1/prometheus.yml')); print('✓ prometheus.yml valid')"
          python3 -c "import yaml; yaml.safe_load(open('week 1/docker-compose.yml')); print('✓ docker-compose.yml valid')"

      - name: Verify JSON log format
        run: |
          python3 -c "
          import json
          test_log = '{\"timestamp\":\"2026-04-22T10:55:45Z\",\"level\":\"INFO\",\"message\":\"test\"}'
          json.loads(test_log)
          print('✓ JSON log format valid')
          "
